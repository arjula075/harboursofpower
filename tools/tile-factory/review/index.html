<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tile factory — review &amp; approve</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <header class="top">
    <div>
      <h1>Tile review</h1>
      <p class="sub">Each tile shows <strong>Prompts &amp; recreate</strong> (edit layers, regenerate) then <strong>Approve</strong>. Restart server after updates.</p>
    </div>
    <p id="server-hint" class="server-hint hidden">Start the server: <code>python3 tools/tile-factory/review_server.py</code></p>
  </header>

  <section class="controls">
    <label>
      Set
      <select id="set-select"></select>
    </label>
    <label>
      Pool
      <select id="pool-select">
        <option value="pending">Pending</option>
        <option value="approved">Approved</option>
        <option value="both">Both (compare)</option>
      </select>
    </label>
    <label>
      Generation
      <select id="generation-select" title="Prompt/art batch (g002, g003…). Legacy flat layout = g001."></select>
    </label>
    <label>
      Slot
      <select id="variation-select" title="Wang alternate textures within one generation (v01–v03).">
        <option value="1">v01</option>
        <option value="2">v02</option>
        <option value="3">v03</option>
        <option value="all">All slots</option>
      </select>
    </label>
    <label>
      View
      <select id="view-select">
        <option value="mosaic">Lake mosaic (5×5)</option>
        <option value="grid">All topologies (grid)</option>
      </select>
    </label>
    <button type="button" id="refresh-btn">Refresh</button>
    <button type="button" id="approve-all-btn" class="secondary" title="Approve every visible pending tile in grid view">Approve all visible</button>
    <a class="map-preview-link" href="/tile-texture-gallery.html" target="_blank" rel="noopener" title="Mosaic of all chart areas using approved/pending tiles">Map preview ↗</a>
  </section>

  <p id="set-meta" class="set-meta"></p>
  <p id="status" class="status" aria-live="polite"></p>

  <section id="mosaic-panel" class="panel">
    <h2>Lake mosaic</h2>
    <p class="hint">Center = open sea · inner ring = shores · outer ring = land</p>
    <div id="mosaic-grid" class="mosaic-grid"></div>
  </section>

  <section id="grid-panel" class="panel hidden">
    <h2>Topology grid</h2>
    <div id="tile-grid" class="tile-grid"></div>
  </section>

  <script src="app.js?v=2"></script>
</body>
</html>
